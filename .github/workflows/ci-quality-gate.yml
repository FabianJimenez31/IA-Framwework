name: CI Quality Gate

on:
  push:
    branches: [ main, master, staging, develop ]
  pull_request:
    branches: [ main, master, staging, develop ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install jq

    - name: Run File Size Enforcement Check
      run: |
        # Run check-file-size.sh on all modified python and shell files in the commit diff
        echo "Running quality checks on file sizes..."
        chmod +x .claude/hooks/check-file-size.sh
        
        # Loop through modified files and pipe simulated jq inputs to check-file-size.sh
        for file in $(git diff --name-only origin/main...HEAD 2>/dev/null || git diff --name-only HEAD~1 2>/dev/null || true); do
          if [ -f "$file" ]; then
            # Ensure jq doesn't crash on invalid inputs
            jq -n --arg path "$file" '{"tool_input":{"file_path":$path}}' | bash .claude/hooks/check-file-size.sh
          fi
        done

    - name: Run Commit Convention Compliance
      run: |
        chmod +x .claude/hooks/pre-commit.sh
        # Run pre-commit checks to simulate hooks remotely
        bash .claude/hooks/pre-commit.sh

    - name: Run Test Suite
      run: |
        # Run pytest or other tests if they are configured
        if [ -f "pytest.ini" ] || [ -d "tests" ]; then
          pip install pytest pytest-cov
          pytest tests/ -v
        else
          echo "No automated tests found, skipping tests run."
        fi

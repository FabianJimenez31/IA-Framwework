# SonarQube Project Analysis Configuration

# Unique project key and name
sonar.projectKey=ia-framework
sonar.projectName=IA-Framework

# Project version
sonar.projectVersion=1.0.0

# Path to source directory (modify to match your codebase layout)
sonar.sources=src

# Path to test directory
sonar.tests=tests

# Language specific configs
sonar.language=py
sonar.sourceEncoding=UTF-8

# Test coverage paths (configured for pytest-cov output)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions - ignore tests, specifications, and temporary files from main count
sonar.exclusions=tests/**, specs/**, temp/**, .claude/**, .specify/**, Makefile, install.sh
